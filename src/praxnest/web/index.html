<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <title>praxnest</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- CodeMirror 6 via JSDelivr ESM bundle. v6 ships as ESM modules; we
       use the prebuilt 'codemirror' meta-package which re-exports core +
       a small set of extensions, keeping the include surface small. -->
  <script type="importmap">
    {
      "imports": {
        "codemirror": "https://esm.sh/codemirror@6.0.1?bundle",
        "@codemirror/lang-markdown": "https://esm.sh/@codemirror/lang-markdown@6.2.5?bundle",
        "@codemirror/view": "https://esm.sh/@codemirror/view@6.26.3?bundle",
        "@codemirror/state": "https://esm.sh/@codemirror/state@6.4.1?bundle",
        "vue": "https://unpkg.com/vue@3.4.27/dist/vue.global.prod.js"
      }
    }
  </script>
  <script src="https://unpkg.com/vue@3.4.27/dist/vue.global.prod.js"></script>
  <style>
    :root {
      --bg: #04050a;
      --bg-card: rgba(255, 255, 255, 0.03);
      --bg-input: rgba(0, 0, 0, 0.3);
      --ink: #e7eaf3;
      --muted: #8e95a8;
      --acc: #6ee7ff;
      --acc-fade: rgba(110, 231, 255, 0.15);
      --ok: #3dde9d;
      --warn: #f59e0b;
      --danger: #ff6d8d;
      --border: rgba(255, 255, 255, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #04050a 0%, #0a0d18 100%);
      color: var(--ink);
      font-size: 14px;
    }
    code, pre, .mono { font-family: "SF Mono", "JetBrains Mono", Menlo, monospace; }

    /* ── Login screen ─────────────────────────────────────────── */
    .login-shell { min-height: 100vh; display: grid; place-items: center; }
    .login-card {
      width: 100%; max-width: 380px;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 16px; padding: 32px;
      backdrop-filter: blur(20px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .login-card h1 { margin: 0 0 4px; font-size: 22px; }
    .subtitle { color: var(--muted); font-size: 13px; }

    label { display: block; font-size: 12px; color: var(--muted); margin: 12px 0 6px; }
    input, select, textarea {
      width: 100%; padding: 8px 10px;
      background: var(--bg-input); color: var(--ink);
      border: 1px solid var(--border); border-radius: 6px;
      font-size: 13px;
    }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--acc); }
    button {
      padding: 8px 14px;
      background: var(--acc); color: #04050a; border: 0;
      border-radius: 6px; font-weight: 600; font-size: 13px; cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: wait; }
    button.secondary { background: transparent; color: var(--ink); border: 1px solid var(--border); }
    button.danger { background: transparent; color: var(--danger); border: 1px solid var(--border); }
    .login-card button { width: 100%; margin-top: 18px; padding: 11px 16px; font-size: 14px; }
    .err { color: var(--danger); font-size: 12px; margin-top: 8px; min-height: 1em; }
    .ok { color: var(--ok); font-size: 12px; margin-top: 8px; min-height: 1em; }
    code {
      background: rgba(255,255,255,0.06); padding: 1px 5px; border-radius: 3px;
      font-size: 12px;
    }

    /* ── Main app shell ───────────────────────────────────────── */
    .app-shell {
      display: grid;
      grid-template-columns: 280px 1fr 240px;
      grid-template-rows: 48px 1fr;
      grid-template-areas:
        "topbar topbar topbar"
        "sidebar editor backlinks";
      height: 100vh;
    }
    .topbar {
      grid-area: topbar; display: flex; align-items: center;
      padding: 0 16px; gap: 16px;
      border-bottom: 1px solid var(--border);
      background: rgba(0,0,0,0.2);
    }
    .topbar .brand { font-weight: 700; letter-spacing: 0.04em; }
    .topbar .ws-picker { flex: 0 0 auto; }
    .topbar .search { flex: 1; max-width: 480px; }
    .topbar .right { margin-left: auto; display: flex; align-items: center; gap: 12px; color: var(--muted); }
    .topbar input { padding: 5px 10px; font-size: 12px; }

    .sidebar {
      grid-area: sidebar;
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 8px 0;
    }
    .sidebar .group-title {
      padding: 8px 14px 4px;
      color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
    }
    .sidebar .note-row {
      padding: 5px 14px; cursor: pointer;
      font-size: 13px; color: var(--ink);
      display: flex; align-items: center; gap: 6px;
    }
    .sidebar .note-row:hover { background: rgba(255,255,255,0.04); }
    .sidebar .note-row.active { background: var(--acc-fade); color: var(--acc); }
    .sidebar .folder-label {
      padding: 8px 14px 2px;
      color: var(--muted); font-size: 11px;
    }

    .editor-area {
      grid-area: editor; display: flex; flex-direction: column; min-width: 0;
    }
    .editor-header {
      padding: 12px 24px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
    }
    .editor-header input.title-input {
      border: 0; background: transparent; padding: 0; font-size: 22px; font-weight: 600;
      color: var(--ink); flex: 1;
    }
    .editor-header input.title-input:focus { outline: none; }
    .editor-status { color: var(--muted); font-size: 12px; }
    .editor-status.saving { color: var(--warn); }
    .editor-status.saved { color: var(--ok); }
    .editor-status.conflict { color: var(--danger); }

    .editor-pane { flex: 1; overflow: hidden; }
    .cm-editor { height: 100%; font-size: 14px; }
    .cm-editor .cm-content { font-family: "SF Mono", monospace; padding: 16px 24px; }
    .cm-editor .cm-gutters { background: transparent; border-right: 1px solid var(--border); }
    .cm-editor .cm-activeLine { background: rgba(255,255,255,0.02); }
    .cm-editor .cm-activeLineGutter { background: transparent; color: var(--ink); }
    .cm-editor.cm-focused { outline: none; }
    .cm-editor .cm-line { color: var(--ink); }
    .cm-editor .cm-cursor { border-left-color: var(--acc); }
    .cm-editor .cm-selectionBackground, .cm-editor.cm-focused .cm-selectionBackground {
      background: rgba(110, 231, 255, 0.2) !important;
    }

    .backlinks-pane {
      grid-area: backlinks;
      border-left: 1px solid var(--border);
      padding: 16px; overflow-y: auto;
    }
    .backlinks-pane h3 {
      margin: 0 0 12px; font-size: 12px; text-transform: uppercase;
      color: var(--muted); letter-spacing: 0.06em;
    }
    .backlink-row {
      padding: 6px 8px; cursor: pointer; border-radius: 4px;
      font-size: 13px;
    }
    .backlink-row:hover { background: rgba(255,255,255,0.04); }

    .empty-state {
      padding: 60px 24px; text-align: center; color: var(--muted);
    }
    .empty-state h3 { color: var(--ink); margin-bottom: 8px; }

    /* Search results dropdown */
    .search-wrapper { position: relative; flex: 1; max-width: 480px; }
    .search-results {
      position: absolute; top: 100%; left: 0; right: 0;
      background: rgba(10, 13, 24, 0.98); border: 1px solid var(--border);
      border-radius: 8px; margin-top: 4px;
      max-height: 360px; overflow-y: auto;
      z-index: 100;
      box-shadow: 0 12px 40px rgba(0,0,0,0.6);
    }
    .search-result {
      padding: 8px 12px; cursor: pointer; border-bottom: 1px solid var(--border);
    }
    .search-result:last-child { border-bottom: 0; }
    .search-result:hover { background: rgba(255,255,255,0.04); }
    .search-result .title { font-size: 13px; }
    .search-result .snippet { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .search-result .snippet mark {
      background: var(--acc-fade); color: var(--acc); padding: 0 2px; border-radius: 2px;
    }

    /* Right pane tabs (反向引用 / AI / 团队记忆) */
    .pane-tabs {
      display: flex; border-bottom: 1px solid var(--border); margin: -16px -16px 12px;
    }
    .pane-tab {
      flex: 1; padding: 10px 12px; cursor: pointer; text-align: center;
      font-size: 12px; color: var(--muted); border-bottom: 2px solid transparent;
    }
    .pane-tab:hover { color: var(--ink); }
    .pane-tab.active { color: var(--acc); border-bottom-color: var(--acc); }
    .pane-body { font-size: 13px; }

    /* AI sidebar */
    .ai-input { width: 100%; min-height: 60px; resize: vertical; }
    .ai-history { margin-top: 12px; }
    .ai-msg { padding: 10px; border-radius: 6px; margin-bottom: 8px; font-size: 13px; line-height: 1.55; }
    .ai-msg.user { background: rgba(110, 231, 255, 0.06); border-left: 2px solid var(--acc); }
    .ai-msg.ai   { background: rgba(255, 255, 255, 0.03); white-space: pre-wrap; }
    .ai-msg.ai mark { background: var(--acc-fade); color: var(--acc); padding: 0 2px; }
    .ai-anchor { font-size: 11px; color: var(--muted); margin-bottom: 4px; }

    /* AI workflow dropdown */
    .ai-actions { position: relative; }
    .ai-actions-menu {
      position: absolute; top: 100%; right: 0;
      background: rgba(10, 13, 24, 0.98); border: 1px solid var(--border);
      border-radius: 6px; min-width: 220px; padding: 4px; margin-top: 4px;
      z-index: 50;
    }
    .ai-actions-section { padding: 6px 8px; color: var(--muted); font-size: 11px; text-transform: uppercase; }
    .ai-action {
      padding: 6px 10px; cursor: pointer; border-radius: 4px;
      font-size: 13px;
    }
    .ai-action:hover { background: rgba(255,255,255,0.05); }
    .ai-action.disabled { color: var(--muted); cursor: not-allowed; }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      display: grid; place-items: center;
      z-index: 200;
    }
    .modal {
      background: rgba(10, 13, 24, 0.98); border: 1px solid var(--border);
      border-radius: 12px; padding: 24px; min-width: 360px; max-width: 480px;
    }
    .modal h2 { margin: 0 0 12px; font-size: 16px; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

    /* Presence pill in topbar */
    .presence-pill {
      padding: 4px 10px; font-size: 11px; border-radius: 12px;
      background: rgba(61, 222, 157, 0.1); color: var(--ok);
      border: 1px solid rgba(61, 222, 157, 0.3);
      cursor: pointer; user-select: none;
    }
    .presence-pill:hover { background: rgba(61, 222, 157, 0.18); }
    .presence-popup {
      position: absolute; top: 44px; right: 200px;
      background: rgba(10, 13, 24, 0.98); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px; min-width: 200px; z-index: 80;
    }
    .presence-row {
      padding: 6px 8px; font-size: 13px; display: flex; gap: 8px; align-items: center;
    }
    .presence-row .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ok); }

    /* Onboarding modal */
    .onboarding-step { display: flex; gap: 12px; padding: 8px 0; }
    .onboarding-step .num {
      width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0;
      display: grid; place-items: center; font-weight: 600; font-size: 12px;
      background: rgba(110, 231, 255, 0.1); color: var(--acc);
    }
    .onboarding-step.done .num { background: var(--ok); color: #04050a; }
    .onboarding-step .text { flex: 1; }
    .onboarding-step .text .label { font-size: 13px; }
    .onboarding-step .text .hint { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* Version-history modal table */
    .version-row {
      padding: 8px; cursor: pointer; border-radius: 4px;
      display: flex; gap: 8px; align-items: baseline;
    }
    .version-row:hover { background: rgba(255,255,255,0.04); }
    .version-row.current { color: var(--muted); cursor: default; }
    .version-row .v { font-family: "SF Mono", monospace; font-size: 11px; color: var(--acc); min-width: 36px; }
    .version-row .meta { font-size: 11px; color: var(--muted); margin-left: auto; }
    .version-preview {
      padding: 12px; background: var(--bg-input); border-radius: 6px;
      font-family: "SF Mono", monospace; font-size: 12px;
      max-height: 240px; overflow: auto; white-space: pre-wrap;
    }

    /* AI msg push-channel footer */
    .ai-msg-actions {
      margin-top: 6px; padding-top: 6px; border-top: 1px solid rgba(255,255,255,0.05);
      display: flex; gap: 6px; align-items: center;
      font-size: 11px; color: var(--muted);
    }
    .ai-msg-actions select, .ai-msg-actions button {
      font-size: 11px; padding: 3px 6px;
    }

    /* Toast */
    .toast {
      position: fixed; bottom: 20px; right: 20px;
      background: rgba(10, 13, 24, 0.98); border: 1px solid var(--border);
      border-left: 3px solid var(--acc);
      border-radius: 8px; padding: 10px 14px; font-size: 13px;
      max-width: 360px; z-index: 300;
    }
    .toast.error { border-left-color: var(--danger); }
    .toast.warn { border-left-color: var(--warn); }
  </style>
</head>
<body>
  <div id="app"></div>

  <script type="module">
    import { EditorView, basicSetup } from "codemirror";
    import { EditorState } from "@codemirror/state";
    import { markdown } from "@codemirror/lang-markdown";
    window.__cm = { EditorView, EditorState, basicSetup, markdown };
  </script>

  <script>
    /* eslint-disable */
    const { createApp, ref, reactive, computed, onMounted, onUnmounted, nextTick, watch } = Vue;

    /* ── Login screen ────────────────────────────────────────────────── */

    const LoginScreen = {
      template: `
        <div class="login-shell">
          <div class="login-card">
            <h1>praxnest</h1>
            <div class="subtitle">本地团队 AI 协作空间</div>
            <form @submit.prevent="submit">
              <label>用户名</label>
              <input v-model="username" autofocus autocomplete="username" />
              <label>密码</label>
              <input v-model="password" type="password" autocomplete="current-password" />
              <button type="submit" :disabled="busy">{{ busy ? '登录中…' : '登录' }}</button>
              <div class="err">{{ error }}</div>
            </form>
            <div class="subtitle" style="margin-top: 16px; text-align: center;">
              第一次跑？终端里执行 <code>praxnest init</code> 创建 admin 账号。
            </div>
          </div>
        </div>
      `,
      emits: ['logged-in'],
      setup(_, { emit }) {
        const username = ref('');
        const password = ref('');
        const busy = ref(false);
        const error = ref('');
        const submit = async () => {
          busy.value = true; error.value = '';
          try {
            const r = await fetch('/api/auth/login', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              credentials: 'same-origin',
              body: JSON.stringify({ username: username.value, password: password.value }),
            });
            if (r.ok) { emit('logged-in', await r.json()); return; }
            error.value = (await r.json().catch(() => ({}))).detail || `登录失败 (HTTP ${r.status})`;
          } catch (e) { error.value = '请求出错：' + e.message; }
          finally { busy.value = false; }
        };
        return { username, password, busy, error, submit };
      },
    };

    /* ── Workspace shell ─────────────────────────────────────────────── */

    const App = {
      template: `
        <login-screen v-if="!me" @logged-in="onLoggedIn" />
        <div v-else class="app-shell">
          <!-- topbar -->
          <div class="topbar">
            <div class="brand">praxnest</div>

            <select v-model="activeWorkspaceId" class="ws-picker" @change="onWorkspaceChange">
              <option v-for="w in workspaces" :key="w.id" :value="w.id">{{ w.name }}</option>
              <option value="__new__">+ 新工作空间</option>
            </select>

            <div class="search-wrapper">
              <input v-model="searchQuery" @input="onSearchInput" @focus="searchFocused = true"
                     @blur="setTimeout(() => searchFocused = false, 200)"
                     placeholder="🔎 搜索笔记内容（FTS5）" />
              <div v-if="searchFocused && searchResults.length" class="search-results">
                <div v-for="r in searchResults" :key="r.id"
                     class="search-result" @mousedown="openSearchHit(r)">
                  <div class="title">{{ r.title }}</div>
                  <div class="snippet" v-html="r.snippet"></div>
                </div>
              </div>
            </div>

            <div class="right" style="position: relative;">
              <div v-if="presence.online.length > 0" class="presence-pill"
                   @click.stop="presence.popoverOpen = !presence.popoverOpen">
                🟢 {{ presence.online.length }} 在线
              </div>
              <div v-if="presence.popoverOpen" class="presence-popup" @click.stop>
                <div v-for="u in presence.online" :key="u.id" class="presence-row">
                  <span class="dot"></span>
                  <span>{{ u.username }}</span>
                  <span style="font-size:10px;color:var(--muted);margin-left:auto;">{{ u.workspace_role }}</span>
                </div>
              </div>
              <button v-if="me.role === 'admin'" class="secondary" @click="openMembersModal" title="成员管理">
                👥
              </button>
              <span class="mono">{{ me.username }}</span>
              <button class="secondary" @click="logout">登出</button>
            </div>
          </div>

          <!-- sidebar (notes tree) -->
          <div class="sidebar">
            <div class="group-title" style="display:flex; justify-content:space-between; align-items:center;">
              <span>笔记</span>
              <button class="secondary" style="padding:2px 8px;font-size:11px;" @click="createNotePrompt">
                +
              </button>
            </div>
            <template v-for="(group, folder) in groupedNotes" :key="folder">
              <div class="folder-label">{{ folder || '/' }}</div>
              <div v-for="n in group" :key="n.id"
                   class="note-row" :class="{active: activeNote && activeNote.id === n.id}"
                   @click="openNote(n.id)">
                <span>📄</span>
                <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">{{ n.title }}</span>
              </div>
            </template>
            <div v-if="!notes.length" class="empty-state" style="padding:20px 14px;font-size:12px;">
              还没有笔记。点上面的「+」新建。
            </div>
          </div>

          <!-- editor -->
          <div class="editor-area">
            <div v-if="activeNote" class="editor-header">
              <input class="title-input" v-model="activeNoteTitle" @blur="renameIfChanged" />
              <span class="editor-status" :class="saveStateClass">{{ saveStateLabel }}</span>
              <!-- AI workflow dropdown — only shown if praxagent installed -->
              <div v-if="aiAvailable" class="ai-actions">
                <button class="secondary" @click.stop="aiMenuOpen = !aiMenuOpen">
                  AI 助手 ▾
                </button>
                <div v-if="aiMenuOpen" class="ai-actions-menu" @click.stop>
                  <div class="ai-actions-section">PRD 助手</div>
                  <div class="ai-action" @click="runWorkflow('prd', 'test-cases')">生成测试用例</div>
                  <div class="ai-action" @click="runWorkflow('prd', 'requirements')">提取需求点</div>
                  <div class="ai-action" @click="runWorkflow('prd', 'checklist')">验收清单</div>
                  <div class="ai-actions-section">Bug 协同</div>
                  <div class="ai-action" @click="runWorkflow('bug', 'assess')">评估严重度 / 排查方向</div>
                  <div class="ai-action" @click="runWorkflow('bug', 'fill-template')">套标准 bug 模板</div>
                  <div class="ai-actions-section">测试报告</div>
                  <div class="ai-action" @click="runWorkflow('test-report', 'summary')">生成执行摘要</div>
                </div>
              </div>
              <button class="secondary" @click="openVersionsModal" title="历史版本">⟲</button>
              <button class="danger" @click="deleteNote">删除</button>
            </div>
            <div class="editor-pane" ref="editorPane">
              <div v-if="!activeNote" class="empty-state">
                <h3>选一篇笔记开始</h3>
                <p>左侧栏点击笔记，或点 + 新建。</p>
              </div>
            </div>
          </div>

          <!-- right pane: tabbed (反向引用 / AI / 团队记忆) -->
          <div class="backlinks-pane">
            <div class="pane-tabs">
              <div class="pane-tab" :class="{active: rightTab === 'backlinks'}" @click="rightTab = 'backlinks'">
                反向引用
              </div>
              <div class="pane-tab" :class="{active: rightTab === 'ai'}" @click="rightTab = 'ai'">
                AI 助手
              </div>
              <div class="pane-tab" :class="{active: rightTab === 'memory'}" @click="rightTab = 'memory'">
                团队记忆
              </div>
            </div>

            <!-- 反向引用 -->
            <div v-show="rightTab === 'backlinks'" class="pane-body">
              <div v-if="!activeNote" style="font-size:12px;color:var(--muted);">
                选中一篇笔记后列出哪些笔记 [[链接]] 到它。
              </div>
              <div v-else-if="!backlinks.length" style="font-size:12px;color:var(--muted);">
                还没有其他笔记引用这篇。在别的笔记里写 <code>[[{{ activeNote.title }}]]</code> 试试。
              </div>
              <div v-else>
                <div v-for="b in backlinks" :key="b.id" class="backlink-row" @click="openNote(b.id)">
                  {{ b.title }}
                  <div style="font-size:11px;color:var(--muted);">{{ b.folder_path || '/' }}</div>
                </div>
              </div>
            </div>

            <!-- AI 助手 -->
            <div v-show="rightTab === 'ai'" class="pane-body">
              <div v-if="!aiAvailable" style="font-size:12px;color:var(--muted);">
                praxagent 未安装。终端跑：<br>
                <code>npm install -g praxagent</code><br>
                然后回到这里，AI 功能会自动启用。
              </div>
              <template v-else>
                <textarea v-model="aiInput" class="ai-input mono"
                          placeholder="问点什么。如果当前打开了笔记，AI 会拿到这篇的内容做上下文。"></textarea>
                <div style="display:flex; gap:6px; margin-top:6px; align-items:center;">
                  <label style="display:flex; gap:4px; align-items:center; font-size:11px;">
                    <input type="checkbox" v-model="aiAnchorToNote" :disabled="!activeNote" />
                    把当前笔记作为上下文
                  </label>
                  <button @click="askAi" :disabled="aiBusy || !aiInput.trim()" style="margin-left:auto;">
                    {{ aiBusy ? '思考中…' : '问 AI' }}
                  </button>
                </div>
                <div class="ai-history">
                  <div v-for="(m, i) in aiMessages" :key="i" :class="['ai-msg', m.role]">
                    <div v-if="m.anchor" class="ai-anchor">📎 {{ m.anchor }}</div>
                    {{ m.text }}
                    <!-- AI replies get a "push to channel" footer if any prax notify channels exist -->
                    <div v-if="m.role === 'ai' && notifyChannels.length > 0" class="ai-msg-actions">
                      <span>推到</span>
                      <select v-model="m.pushChannel" :disabled="m.pushBusy">
                        <option v-for="ch in notifyChannels" :key="ch" :value="ch">{{ ch }}</option>
                      </select>
                      <button @click="pushAiMessage(m)" :disabled="m.pushBusy || !m.pushChannel">
                        {{ m.pushBusy ? '推送中…' : '推群' }}
                      </button>
                      <span v-if="m.pushSent" style="color: var(--ok);">✓ 已推</span>
                    </div>
                  </div>
                </div>
              </template>
            </div>

            <!-- 团队记忆 -->
            <div v-show="rightTab === 'memory'" class="pane-body">
              <div v-if="!activeNote" style="font-size:12px;color:var(--muted);">
                选中笔记后这里显示工作空间内 / 跨工作空间内容相似的笔记。
              </div>
              <template v-else>
                <div style="display:flex; gap:8px; align-items:center; margin-bottom:10px;">
                  <label style="font-size:11px; display:flex; gap:4px; align-items:center;">
                    <input type="checkbox" v-model="memoryCrossWs" @change="loadMemory" />
                    跨工作空间
                  </label>
                  <button @click="loadMemory" :disabled="memoryBusy" style="margin-left:auto;font-size:11px;padding:4px 8px;">
                    {{ memoryBusy ? '搜索中…' : '刷新' }}
                  </button>
                </div>
                <div v-if="!memoryResults.length && !memoryBusy" style="font-size:12px;color:var(--muted);">
                  没找到相似笔记。继续写下去，AI 找到关联会主动提示。
                </div>
                <div v-for="r in memoryResults" :key="r.id" class="backlink-row" @click="openNote(r.id, r.workspace_id)">
                  {{ r.title }}
                  <div v-if="r.workspace_name" style="font-size:11px;color:var(--acc);">
                    📦 {{ r.workspace_name }}
                  </div>
                  <div style="font-size:11px;color:var(--muted);" v-html="r.snippet"></div>
                </div>
              </template>
            </div>
          </div>
        </div>

        <!-- New workspace modal -->
        <div v-if="newWsModal.open" class="modal-overlay" @click.self="newWsModal.open = false">
          <div class="modal">
            <h2>新工作空间</h2>
            <input v-model="newWsModal.name" placeholder="名称（如 Engineering）" autofocus
                   @keydown.enter="confirmNewWorkspace" />
            <div class="err">{{ newWsModal.error }}</div>
            <div class="modal-actions">
              <button class="secondary" @click="newWsModal.open = false">取消</button>
              <button @click="confirmNewWorkspace" :disabled="!newWsModal.name.trim()">创建</button>
            </div>
          </div>
        </div>

        <!-- Conflict modal -->
        <div v-if="conflictModal.open" class="modal-overlay" @click.self="conflictModal.open = false">
          <div class="modal" style="max-width: 600px;">
            <h2>⚠ 别人也改了这篇笔记</h2>
            <p style="color:var(--muted);font-size:13px;">
              当你打开这篇笔记后（v{{ conflictModal.your_base_version }}），有人保存了 v{{ conflictModal.their_version }}。
              选择保留谁的版本：
            </p>
            <div style="font-size:12px;margin-top:12px;color:var(--muted);">他们写的：</div>
            <pre style="background:var(--bg-input);padding:8px;border-radius:4px;max-height:160px;overflow:auto;font-size:12px;white-space:pre-wrap;">{{ conflictModal.their_body }}</pre>
            <div class="modal-actions">
              <button class="secondary" @click="conflictModal.open = false">取消（什么都不做）</button>
              <button @click="conflictAcceptTheirs">用他们的</button>
              <button @click="conflictForceMine">用我的覆盖</button>
            </div>
          </div>
        </div>

        <!-- Onboarding modal -->
        <div v-if="onboarding.open" class="modal-overlay" @click.self="dismissOnboarding">
          <div class="modal" style="max-width: 480px;">
            <h2>欢迎，praxnest 第一次使用</h2>
            <p style="color: var(--muted); font-size: 13px; line-height: 1.6;">
              4 步搞定一个能用的团队空间。先把这单子走完，每步完成自动打勾。
            </p>

            <div :class="['onboarding-step', onboarding.step1 ? 'done' : '']">
              <div class="num">{{ onboarding.step1 ? '✓' : '1' }}</div>
              <div class="text">
                <div class="label">创建第一个工作空间</div>
                <div class="hint">PRD / bug / 测试报告归一类。</div>
              </div>
              <button v-if="!onboarding.step1" @click="onboarding.open = false; newWsModal.open = true">
                创建
              </button>
            </div>

            <div :class="['onboarding-step', onboarding.step2 ? 'done' : '']">
              <div class="num">{{ onboarding.step2 ? '✓' : '2' }}</div>
              <div class="text">
                <div class="label">加同事进来（可选）</div>
                <div class="hint">先给同事建账号 → 加入工作空间。系统 admin 才能创建账号。</div>
              </div>
              <button v-if="me.role === 'admin' && onboarding.step1 && !onboarding.step2"
                      @click="onboarding.open = false; openMembersModal()">
                管理成员
              </button>
            </div>

            <div :class="['onboarding-step', onboarding.step3 ? 'done' : '']">
              <div class="num">{{ onboarding.step3 ? '✓' : '3' }}</div>
              <div class="text">
                <div class="label">检查 AI 助手能不能用</div>
                <div class="hint">{{ aiAvailable ? '已就绪 — praxagent 在 PATH 里 ✓' : '需要装 praxagent: npm install -g praxagent' }}</div>
              </div>
            </div>

            <div :class="['onboarding-step']">
              <div class="num">4</div>
              <div class="text">
                <div class="label">写第一篇笔记</div>
                <div class="hint">关掉这个对话框，左侧栏「+」就能开始。</div>
              </div>
            </div>

            <div class="modal-actions">
              <button class="secondary" @click="dismissOnboarding">关闭，不再提示</button>
            </div>
          </div>
        </div>

        <!-- Members modal (admin) -->
        <div v-if="membersModal.open" class="modal-overlay" @click.self="membersModal.open = false">
          <div class="modal" style="max-width: 600px;">
            <h2>成员管理 — {{ workspaces.find(w => w.id === activeWorkspaceId)?.name || '当前工作空间' }}</h2>

            <h3 style="font-size: 13px; margin-top: 16px; color: var(--muted);">本空间成员</h3>
            <div v-if="membersModal.members.length === 0" style="font-size: 12px; color: var(--muted);">
              暂无（除你之外）
            </div>
            <div v-for="m in membersModal.members" :key="m.id"
                 style="display:flex; gap:8px; align-items:center; padding:6px 0; border-bottom: 1px solid var(--border);">
              <span class="mono" style="font-size:13px;">{{ m.username }}</span>
              <select v-model="m.workspace_role" @change="setMemberRole(m.id, m.workspace_role)"
                      :disabled="m.id === me.id" style="font-size: 11px;">
                <option value="admin">admin</option>
                <option value="member">member</option>
              </select>
              <span style="margin-left: auto;">
                <button v-if="m.id !== me.id" class="danger" @click="removeMember(m.id)">移出</button>
                <span v-else style="font-size:11px; color: var(--muted);">（你自己）</span>
              </span>
            </div>

            <h3 style="font-size: 13px; margin-top: 16px; color: var(--muted);">邀请已有用户加入</h3>
            <div style="display:flex; gap:8px;">
              <input v-model="membersModal.inviteUsername" placeholder="用户名" style="flex:1;" />
              <select v-model="membersModal.inviteRole" style="font-size: 12px;">
                <option value="member">member</option>
                <option value="admin">admin</option>
              </select>
              <button @click="inviteMember">+ 加入</button>
            </div>
            <div v-if="membersModal.inviteError" style="font-size:11px; color: var(--danger); margin-top: 4px;">
              {{ membersModal.inviteError }}
            </div>

            <h3 style="font-size: 13px; margin-top: 20px; color: var(--muted);">创建新账号（系统级）</h3>
            <div style="display:flex; gap:8px;">
              <input v-model="membersModal.newUsername" placeholder="用户名" style="flex:1;" />
              <input v-model="membersModal.newPassword" type="password" placeholder="密码（8+ 位）" style="flex:1;" />
              <button @click="createUser">创建</button>
            </div>
            <div v-if="membersModal.createError" style="font-size:11px; color: var(--danger); margin-top: 4px;">
              {{ membersModal.createError }}
            </div>

            <div class="modal-actions">
              <button class="secondary" @click="membersModal.open = false">关闭</button>
            </div>
          </div>
        </div>

        <!-- Versions modal -->
        <div v-if="versionsModal.open" class="modal-overlay" @click.self="versionsModal.open = false">
          <div class="modal" style="max-width: 720px; min-width: 600px;">
            <h2>历史版本 — {{ activeNote?.title }}</h2>
            <div v-if="versionsModal.list.length === 0" style="font-size:12px; color: var(--muted);">
              这篇笔记还没有历史版本。每次保存内容变化时会自动留档。
            </div>
            <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 16px; margin-top: 12px;" v-else>
              <div>
                <div class="version-row current">
                  <span class="v">v{{ activeNote?.version }}</span>
                  <span>当前版本</span>
                </div>
                <div v-for="v in versionsModal.list" :key="v.id"
                     class="version-row" :class="{active: versionsModal.selected?.id === v.id}"
                     @click="loadVersion(v)">
                  <span class="v">v{{ v.version }}</span>
                  <span>{{ v.title }}</span>
                  <span class="meta">
                    {{ v.saved_by_username || '—' }} · {{ v.saved_at }}
                  </span>
                </div>
              </div>
              <div>
                <div v-if="!versionsModal.selected" style="font-size:12px;color:var(--muted);">
                  点左侧某版本预览。
                </div>
                <div v-else>
                  <div style="font-size:11px; color: var(--muted); margin-bottom:6px;">
                    v{{ versionsModal.selected.version }} · {{ versionsModal.selected.saved_by_username || '—' }} · {{ versionsModal.selected.saved_at }}
                  </div>
                  <pre class="version-preview">{{ versionsModal.selected.body_md || '' }}</pre>
                  <button @click="restoreVersion(versionsModal.selected.id)" style="margin-top:8px;">
                    恢复到这个版本
                  </button>
                </div>
              </div>
            </div>
            <div class="modal-actions">
              <button class="secondary" @click="versionsModal.open = false">关闭</button>
            </div>
          </div>
        </div>

        <!-- Toast -->
        <div v-if="toast.message" :class="['toast', toast.kind]">{{ toast.message }}</div>
      `,
      components: { LoginScreen },
      setup() {
        const me = ref(null);
        const workspaces = ref([]);
        const activeWorkspaceId = ref(null);
        const notes = ref([]);
        const activeNote = ref(null);
        const activeNoteTitle = ref('');
        const backlinks = ref([]);
        const saveState = ref('idle');  // idle | dirty | saving | saved | conflict
        const editorPane = ref(null);
        let cmView = null;
        let saveTimer = null;
        let lastSavedBody = '';
        const searchQuery = ref('');
        const searchResults = ref([]);
        const searchFocused = ref(false);
        let searchTimer = null;
        const newWsModal = reactive({ open: false, name: '', error: '' });
        const conflictModal = reactive({ open: false, your_base_version: 0, their_version: 0, their_body: '' });
        const toast = reactive({ message: '', kind: 'info' });

        // AI sidebar state
        const rightTab = ref('backlinks');
        const aiAvailable = ref(false);
        const aiMenuOpen = ref(false);
        const aiInput = ref('');
        const aiBusy = ref(false);
        const aiAnchorToNote = ref(true);
        const aiMessages = ref([]); // [{role: 'user'|'ai', text, anchor?}]

        // Team memory state
        const memoryResults = ref([]);
        const memoryBusy = ref(false);
        const memoryCrossWs = ref(false);

        // Click-outside closes AI menu + presence popover
        const handleDocClick = () => {
          aiMenuOpen.value = false;
          presence.popoverOpen = false;
        };
        document.addEventListener('click', handleDocClick);

        // Presence — heartbeat ping + workspace online roster
        const presence = reactive({ online: [], total: 0, popoverOpen: false });
        let heartbeatTimer = null;
        const startHeartbeat = () => {
          // Ping immediately on login + every 30s while page open.
          // Server's online window is 90s so one missed beat is fine.
          const ping = async () => {
            try { await fetch('/api/heartbeat', { method: 'POST', credentials: 'same-origin' }); } catch {}
          };
          ping();
          heartbeatTimer = setInterval(() => {
            ping();
            loadPresence();
          }, 30000);
        };
        const stopHeartbeat = () => {
          if (heartbeatTimer) { clearInterval(heartbeatTimer); heartbeatTimer = null; }
        };
        const loadPresence = async () => {
          if (!activeWorkspaceId.value) return;
          try {
            const r = await fetch(`/api/workspaces/${activeWorkspaceId.value}/online`, { credentials: 'same-origin' });
            if (r.ok) {
              const d = await r.json();
              presence.online = d.online || [];
              presence.total = d.total_members || 0;
            }
          } catch {}
        };

        // Onboarding state — derive from observed completion.
        const ONBOARDING_KEY = 'praxnest.onboarding_dismissed';
        const onboarding = reactive({
          open: false,
          step1: false,  // workspace created
          step2: false,  // ≥1 other member
          step3: false,  // praxagent on PATH
        });
        const dismissOnboarding = () => {
          onboarding.open = false;
          try { localStorage.setItem(ONBOARDING_KEY, '1'); } catch {}
        };
        const maybeShowOnboarding = () => {
          // Show only once per browser. Skip if user already has things set up.
          let dismissed = false;
          try { dismissed = localStorage.getItem(ONBOARDING_KEY) === '1'; } catch {}
          onboarding.step1 = workspaces.value.length > 0;
          // step2 fires when there's >1 member in any workspace; check first workspace
          // Approximate — load full members list lazily.
          onboarding.step3 = aiAvailable.value;
          // Open if not yet dismissed AND not yet fully set up.
          if (!dismissed && !(onboarding.step1 && onboarding.step3)) {
            onboarding.open = true;
          }
        };

        // Members modal (admin)
        const membersModal = reactive({
          open: false, members: [],
          inviteUsername: '', inviteRole: 'member', inviteError: '',
          newUsername: '', newPassword: '', createError: '',
        });
        const openMembersModal = async () => {
          if (!activeWorkspaceId.value) return;
          membersModal.open = true;
          membersModal.inviteError = '';
          membersModal.createError = '';
          await loadMembers();
          // Step-2 onboarding is "≥1 other member" — refresh now that we know.
          onboarding.step2 = membersModal.members.length > 1;
        };
        const loadMembers = async () => {
          const r = await fetch(`/api/workspaces/${activeWorkspaceId.value}/members`, { credentials: 'same-origin' });
          if (r.ok) membersModal.members = (await r.json()).members || [];
        };
        const inviteMember = async () => {
          membersModal.inviteError = '';
          const username = membersModal.inviteUsername.trim();
          if (!username) return;
          const r = await fetch(`/api/workspaces/${activeWorkspaceId.value}/members`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            credentials: 'same-origin',
            body: JSON.stringify({ username, role: membersModal.inviteRole }),
          });
          if (!r.ok) {
            membersModal.inviteError = (await r.json().catch(() => ({}))).detail || `HTTP ${r.status}`;
            return;
          }
          membersModal.inviteUsername = '';
          await loadMembers();
          showToast(`已加入 ${username}`, 'success');
        };
        const removeMember = async (memberUserId) => {
          if (!confirm('移出该成员？他们之后看不到这个工作空间。')) return;
          const r = await fetch(`/api/workspaces/${activeWorkspaceId.value}/members/${memberUserId}`, {
            method: 'DELETE', credentials: 'same-origin',
          });
          if (!r.ok) { showToast('移出失败：' + ((await r.json()).detail || r.statusText), 'error'); return; }
          await loadMembers();
        };
        const setMemberRole = async (memberUserId, role) => {
          const r = await fetch(`/api/workspaces/${activeWorkspaceId.value}/members/${memberUserId}/role`, {
            method: 'PUT', headers: { 'Content-Type': 'application/json' },
            credentials: 'same-origin', body: JSON.stringify({ role }),
          });
          if (!r.ok) { showToast('改角色失败', 'error'); return; }
          showToast(`角色已改为 ${role}`, 'success');
        };
        const createUser = async () => {
          membersModal.createError = '';
          const username = membersModal.newUsername.trim();
          const password = membersModal.newPassword;
          if (!username || !password) {
            membersModal.createError = '用户名和密码都得填'; return;
          }
          const r = await fetch('/api/admin/users', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            credentials: 'same-origin',
            body: JSON.stringify({ username, password, role: 'member' }),
          });
          if (!r.ok) {
            membersModal.createError = (await r.json().catch(() => ({}))).detail || `HTTP ${r.status}`;
            return;
          }
          membersModal.newUsername = ''; membersModal.newPassword = '';
          showToast(`✓ 账号 ${username} 已创建（还没加入工作空间）`, 'success');
        };

        // Versions modal
        const versionsModal = reactive({
          open: false, list: [], selected: null,
        });
        const openVersionsModal = async () => {
          if (!activeNote.value) return;
          versionsModal.open = true;
          versionsModal.selected = null;
          const r = await fetch(
            `/api/workspaces/${activeWorkspaceId.value}/notes/${activeNote.value.id}/versions`,
            { credentials: 'same-origin' });
          if (r.ok) versionsModal.list = (await r.json()).versions || [];
        };
        const loadVersion = async (v) => {
          const r = await fetch(
            `/api/workspaces/${activeWorkspaceId.value}/notes/${activeNote.value.id}/versions/${v.id}`,
            { credentials: 'same-origin' });
          if (r.ok) versionsModal.selected = await r.json();
        };
        const restoreVersion = async (versionId) => {
          if (!confirm('恢复到该版本？当前版本会自动留档（这个操作可逆）。')) return;
          const r = await fetch(
            `/api/workspaces/${activeWorkspaceId.value}/notes/${activeNote.value.id}/versions/${versionId}/restore`,
            { method: 'POST', credentials: 'same-origin' });
          if (!r.ok) { showToast('恢复失败：' + ((await r.json()).detail || r.statusText), 'error'); return; }
          versionsModal.open = false;
          // Reload the note in editor.
          await openNote(activeNote.value.id);
          showToast('✓ 已恢复', 'success');
        };

        // Notify channels for the AI push-to-channel button
        const notifyChannels = ref([]);
        const loadNotifyChannels = async () => {
          if (!activeWorkspaceId.value) return;
          try {
            const r = await fetch(`/api/workspaces/${activeWorkspaceId.value}/notify/channels`, { credentials: 'same-origin' });
            if (r.ok) notifyChannels.value = (await r.json()).channels || [];
          } catch {}
        };
        const pushAiMessage = async (m) => {
          if (!m.pushChannel) return;
          m.pushBusy = true;
          try {
            const r = await fetch(`/api/workspaces/${activeWorkspaceId.value}/notify/push`, {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              credentials: 'same-origin',
              body: JSON.stringify({
                channel: m.pushChannel,
                title: m.anchor ? `praxnest · ${m.anchor}` : 'praxnest 输出',
                body: m.text,
              }),
            });
            if (!r.ok) {
              const d = await r.json().catch(() => ({}));
              showToast('推送失败：' + (d.detail || r.statusText), 'error', 6000);
              return;
            }
            m.pushSent = true;
            showToast(`已推到 ${m.pushChannel}`, 'success');
          } finally { m.pushBusy = false; }
        };

        const showToast = (message, kind = 'info', timeout = 3000) => {
          toast.message = message; toast.kind = kind;
          setTimeout(() => { toast.message = ''; }, timeout);
        };

        // ── auth bootstrap ────────────────────────────────────────────
        const fetchMe = async () => {
          try {
            const r = await fetch('/api/auth/me', { credentials: 'same-origin' });
            if (r.ok) { me.value = await r.json(); return true; }
          } catch {}
          me.value = null;
          return false;
        };
        const onLoggedIn = (user) => { me.value = user; loadWorkspaces(); };
        const logout = async () => {
          await fetch('/api/auth/logout', { method: 'POST', credentials: 'same-origin' });
          me.value = null; workspaces.value = []; activeWorkspaceId.value = null;
          notes.value = []; activeNote.value = null;
          if (cmView) { cmView.destroy(); cmView = null; }
        };

        // ── workspaces ────────────────────────────────────────────────
        const loadWorkspaces = async () => {
          const r = await fetch('/api/workspaces', { credentials: 'same-origin' });
          const data = await r.json();
          workspaces.value = data.workspaces || [];
          if (workspaces.value.length === 0) {
            // First-run UX: open the new-workspace modal automatically.
            newWsModal.open = true;
          } else if (!activeWorkspaceId.value || !workspaces.value.find(w => w.id === activeWorkspaceId.value)) {
            activeWorkspaceId.value = workspaces.value[0].id;
            await loadNotes();
          }
        };
        const onWorkspaceChange = async () => {
          if (activeWorkspaceId.value === '__new__') {
            newWsModal.open = true;
            activeWorkspaceId.value = workspaces.value[0]?.id ?? null;
            return;
          }
          activeNote.value = null;
          aiMessages.value = [];
          memoryResults.value = [];
          await Promise.all([loadNotes(), loadAiStatus(), loadPresence(), loadNotifyChannels()]);
        };

        const loadAiStatus = async () => {
          if (!activeWorkspaceId.value) return;
          try {
            const r = await fetch(`/api/workspaces/${activeWorkspaceId.value}/ai/status`, { credentials: 'same-origin' });
            if (r.ok) aiAvailable.value = (await r.json()).available;
          } catch { aiAvailable.value = false; }
        };

        const askAi = async () => {
          const question = aiInput.value.trim();
          if (!question) return;
          aiBusy.value = true;
          const anchorTitle = aiAnchorToNote.value && activeNote.value ? activeNote.value.title : null;
          aiMessages.value.push({ role: 'user', text: question, anchor: anchorTitle });
          aiInput.value = '';
          try {
            const body = { question };
            if (anchorTitle) body.note_id = activeNote.value.id;
            const r = await fetch(`/api/workspaces/${activeWorkspaceId.value}/ai/ask`, {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              credentials: 'same-origin', body: JSON.stringify(body),
            });
            if (!r.ok) {
              const d = await r.json().catch(() => ({}));
              aiMessages.value.push({ role: 'ai', text: '❌ ' + (d.detail || `HTTP ${r.status}`) });
            } else {
              aiMessages.value.push({ role: 'ai', text: (await r.json()).output || '(空回复)' });
            }
          } catch (e) {
            aiMessages.value.push({ role: 'ai', text: '❌ 请求出错：' + e.message });
          } finally { aiBusy.value = false; }
        };

        const runWorkflow = async (kind, action) => {
          aiMenuOpen.value = false;
          if (!activeNote.value) { showToast('先打开一篇笔记', 'warn'); return; }
          rightTab.value = 'ai';
          aiBusy.value = true;
          aiMessages.value.push({
            role: 'user',
            text: `🔧 工作流：${kind} / ${action}`,
            anchor: activeNote.value.title,
          });
          try {
            const r = await fetch(
              `/api/workspaces/${activeWorkspaceId.value}/ai/workflows/${kind}/${action}`,
              {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                credentials: 'same-origin',
                body: JSON.stringify({ note_id: activeNote.value.id }),
              });
            if (!r.ok) {
              const d = await r.json().catch(() => ({}));
              aiMessages.value.push({ role: 'ai', text: '❌ ' + (d.detail || `HTTP ${r.status}`) });
            } else {
              aiMessages.value.push({ role: 'ai', text: (await r.json()).output || '(空回复)' });
            }
          } catch (e) {
            aiMessages.value.push({ role: 'ai', text: '❌ 请求出错：' + e.message });
          } finally { aiBusy.value = false; }
        };

        const loadMemory = async () => {
          if (!activeNote.value) { memoryResults.value = []; return; }
          memoryBusy.value = true;
          try {
            const url = memoryCrossWs.value
              ? `/api/memory/similar-across-workspaces?note_id=${activeNote.value.id}`
              : `/api/workspaces/${activeWorkspaceId.value}/memory/similar?note_id=${activeNote.value.id}`;
            const r = await fetch(url, { credentials: 'same-origin' });
            if (r.ok) memoryResults.value = (await r.json()).results || [];
          } catch { memoryResults.value = []; }
          finally { memoryBusy.value = false; }
        };
        const confirmNewWorkspace = async () => {
          const name = newWsModal.name.trim();
          if (!name) return;
          const r = await fetch('/api/workspaces', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            credentials: 'same-origin', body: JSON.stringify({ name }),
          });
          if (!r.ok) {
            newWsModal.error = (await r.json().catch(() => ({}))).detail || '创建失败';
            return;
          }
          const ws = await r.json();
          newWsModal.open = false; newWsModal.name = ''; newWsModal.error = '';
          await loadWorkspaces();
          activeWorkspaceId.value = ws.id;
          await loadNotes();
        };

        // ── notes ─────────────────────────────────────────────────────
        const loadNotes = async () => {
          if (!activeWorkspaceId.value) return;
          const r = await fetch(`/api/workspaces/${activeWorkspaceId.value}/notes`, { credentials: 'same-origin' });
          const data = await r.json();
          notes.value = data.notes || [];
        };
        const groupedNotes = computed(() => {
          const groups = {};
          for (const n of notes.value) {
            const folder = n.folder_path || '';
            if (!groups[folder]) groups[folder] = [];
            groups[folder].push(n);
          }
          return groups;
        });

        const createNotePrompt = async () => {
          const title = window.prompt('笔记标题');
          if (!title || !title.trim()) return;
          const folder = window.prompt('文件夹路径（留空 = 根目录）', '') || '';
          const r = await fetch(`/api/workspaces/${activeWorkspaceId.value}/notes`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            credentials: 'same-origin',
            body: JSON.stringify({ title: title.trim(), folder_path: folder.trim(), body_md: '' }),
          });
          if (!r.ok) { showToast('创建失败：' + ((await r.json()).detail || r.statusText), 'error'); return; }
          const note = await r.json();
          await loadNotes();
          openNote(note.id);
        };

        const openNote = async (note_id, target_workspace_id = null) => {
          if (saveTimer) { clearTimeout(saveTimer); saveTimer = null; await saveNow(); }
          // Cross-workspace open (clicked a memory result from another workspace):
          // switch the active workspace first, then load that note.
          if (target_workspace_id && target_workspace_id !== activeWorkspaceId.value) {
            activeWorkspaceId.value = target_workspace_id;
            await loadNotes();
          }
          const r = await fetch(`/api/workspaces/${activeWorkspaceId.value}/notes/${note_id}`, { credentials: 'same-origin' });
          if (!r.ok) { showToast('读取失败', 'error'); return; }
          activeNote.value = await r.json();
          activeNoteTitle.value = activeNote.value.title;
          lastSavedBody = activeNote.value.body_md;
          saveState.value = 'idle';
          await nextTick();
          mountEditor();
          loadBacklinks();
          // Memory only auto-loads if the user is currently on that tab
          // — avoids running the FTS5 query for every note click.
          if (rightTab.value === 'memory') loadMemory();
        };

        const mountEditor = () => {
          if (cmView) { cmView.destroy(); cmView = null; }
          if (!activeNote.value || !editorPane.value || !window.__cm) return;
          const { EditorView, EditorState, basicSetup, markdown } = window.__cm;
          cmView = new EditorView({
            parent: editorPane.value,
            state: EditorState.create({
              doc: activeNote.value.body_md,
              extensions: [
                basicSetup,
                markdown(),
                EditorView.theme({}, { dark: true }),
                EditorView.updateListener.of((v) => {
                  if (v.docChanged) onBodyChange();
                }),
                // Paste / drop handlers — uploads files, inserts the
                // server-returned markdown snippet at the cursor.
                EditorView.domEventHandlers({
                  paste: (event, view) => handleClipboardPaste(event, view),
                  drop:  (event, view) => handleFileDrop(event, view),
                  dragover: (event) => { event.preventDefault(); },
                }),
              ],
            }),
          });
        };

        const insertAtCursor = (view, text) => {
          const pos = view.state.selection.main.head;
          view.dispatch({
            changes: { from: pos, insert: text },
            selection: { anchor: pos + text.length },
          });
        };

        const uploadFile = async (file) => {
          if (!activeWorkspaceId.value) return null;
          const fd = new FormData();
          fd.append('file', file);
          const r = await fetch(`/api/workspaces/${activeWorkspaceId.value}/attachments`, {
            method: 'POST', credentials: 'same-origin', body: fd,
          });
          if (!r.ok) {
            const d = await r.json().catch(() => ({}));
            showToast('上传失败：' + (d.detail || `HTTP ${r.status}`), 'error', 6000);
            return null;
          }
          return await r.json();
        };

        const handleClipboardPaste = (event, view) => {
          const items = Array.from(event.clipboardData?.items || []);
          // Look for image data on the clipboard (e.g. cmd+shift+ctrl+4 on macOS).
          const imageItem = items.find(it => it.kind === 'file' && it.type.startsWith('image/'));
          if (!imageItem) return false;
          event.preventDefault();
          const file = imageItem.getAsFile();
          if (!file) return false;
          uploadFile(file).then(rec => {
            if (rec) insertAtCursor(view, rec.md_snippet);
          });
          return true;
        };

        const handleFileDrop = (event, view) => {
          const files = Array.from(event.dataTransfer?.files || []);
          if (!files.length) return false;
          event.preventDefault();
          (async () => {
            for (const f of files) {
              const rec = await uploadFile(f);
              if (rec) insertAtCursor(view, rec.md_snippet + '\n');
            }
          })();
          return true;
        };

        const onBodyChange = () => {
          saveState.value = 'dirty';
          if (saveTimer) clearTimeout(saveTimer);
          saveTimer = setTimeout(saveNow, 1000);
        };

        const saveNow = async () => {
          if (!activeNote.value || !cmView) return;
          const body = cmView.state.doc.toString();
          if (body === lastSavedBody && activeNoteTitle.value === activeNote.value.title) {
            saveState.value = 'saved'; return;
          }
          saveState.value = 'saving';
          const note_id = activeNote.value.id;
          const expected_version = activeNote.value.version;
          const r = await fetch(`/api/workspaces/${activeWorkspaceId.value}/notes/${note_id}`, {
            method: 'PUT', headers: { 'Content-Type': 'application/json' },
            credentials: 'same-origin',
            body: JSON.stringify({
              expected_version,
              body_md: body,
              title: activeNoteTitle.value,
            }),
          });
          if (r.status === 409) {
            const detail = (await r.json()).detail;
            saveState.value = 'conflict';
            conflictModal.open = true;
            conflictModal.your_base_version = expected_version;
            conflictModal.their_version = detail.current_version;
            conflictModal.their_body = detail.current_body;
            return;
          }
          if (!r.ok) {
            saveState.value = 'idle';
            showToast('保存失败：' + ((await r.json()).detail || r.statusText), 'error');
            return;
          }
          activeNote.value = await r.json();
          lastSavedBody = body;
          saveState.value = 'saved';
          await loadNotes();
          await loadBacklinks();
        };

        const conflictAcceptTheirs = async () => {
          if (!activeNote.value || !cmView) return;
          // Reload from server, replace editor content.
          const r = await fetch(`/api/workspaces/${activeWorkspaceId.value}/notes/${activeNote.value.id}`, { credentials: 'same-origin' });
          activeNote.value = await r.json();
          activeNoteTitle.value = activeNote.value.title;
          lastSavedBody = activeNote.value.body_md;
          conflictModal.open = false;
          saveState.value = 'saved';
          mountEditor();
        };
        const conflictForceMine = async () => {
          // Save again with their version as expected — we now know it.
          if (!activeNote.value) return;
          activeNote.value.version = conflictModal.their_version;
          conflictModal.open = false;
          saveNow();
        };

        const renameIfChanged = () => {
          if (!activeNote.value) return;
          if (activeNoteTitle.value.trim() !== activeNote.value.title) {
            saveState.value = 'dirty';
            if (saveTimer) clearTimeout(saveTimer);
            saveTimer = setTimeout(saveNow, 200);
          }
        };

        const deleteNote = async () => {
          if (!activeNote.value) return;
          if (!confirm(`删除笔记 "${activeNote.value.title}"？`)) return;
          await fetch(`/api/workspaces/${activeWorkspaceId.value}/notes/${activeNote.value.id}`, {
            method: 'DELETE', credentials: 'same-origin',
          });
          activeNote.value = null;
          if (cmView) { cmView.destroy(); cmView = null; }
          await loadNotes();
        };

        const loadBacklinks = async () => {
          if (!activeNote.value) { backlinks.value = []; return; }
          const r = await fetch(`/api/workspaces/${activeWorkspaceId.value}/notes/${activeNote.value.id}/backlinks`, { credentials: 'same-origin' });
          if (r.ok) backlinks.value = (await r.json()).backlinks || [];
        };

        const onSearchInput = () => {
          if (searchTimer) clearTimeout(searchTimer);
          searchTimer = setTimeout(async () => {
            if (!searchQuery.value.trim()) { searchResults.value = []; return; }
            const r = await fetch(
              `/api/workspaces/${activeWorkspaceId.value}/search?q=${encodeURIComponent(searchQuery.value)}`,
              { credentials: 'same-origin' });
            if (r.ok) searchResults.value = (await r.json()).results || [];
          }, 200);
        };
        const openSearchHit = (hit) => {
          searchQuery.value = ''; searchResults.value = []; searchFocused.value = false;
          openNote(hit.id);
        };

        // ── status label ──────────────────────────────────────────────
        const saveStateLabel = computed(() => ({
          idle: '', dirty: '未保存', saving: '保存中…', saved: '✓ 已保存', conflict: '⚠ 有冲突',
        }[saveState.value] || ''));
        const saveStateClass = computed(() => saveState.value);

        // Auto-load memory when user first switches to the team-memory tab,
        // so they don't see an empty pane and wonder if it's broken.
        watch(rightTab, (newTab) => {
          if (newTab === 'memory' && activeNote.value && !memoryResults.value.length) {
            loadMemory();
          }
        });

        // Save before page unload (best-effort).
        const beforeUnload = () => { if (saveTimer) saveNow(); };
        onMounted(async () => {
          window.addEventListener('beforeunload', beforeUnload);
          if (await fetchMe()) {
            await loadWorkspaces();
            await loadAiStatus();
            await loadNotifyChannels();
            await loadPresence();
            startHeartbeat();
            maybeShowOnboarding();
          }
        });
        onUnmounted(() => {
          window.removeEventListener('beforeunload', beforeUnload);
          document.removeEventListener('click', handleDocClick);
          stopHeartbeat();
        });

        return {
          me, workspaces, activeWorkspaceId, notes, groupedNotes, activeNote, activeNoteTitle,
          backlinks, saveStateLabel, saveStateClass, editorPane,
          searchQuery, searchResults, searchFocused,
          newWsModal, conflictModal, toast,
          // right-pane tabs
          rightTab,
          // AI
          aiAvailable, aiMenuOpen, aiInput, aiBusy, aiAnchorToNote, aiMessages,
          // memory
          memoryResults, memoryBusy, memoryCrossWs, loadMemory,
          // handlers
          onLoggedIn, logout, onWorkspaceChange, confirmNewWorkspace,
          createNotePrompt, openNote, deleteNote, renameIfChanged,
          conflictAcceptTheirs, conflictForceMine,
          onSearchInput, openSearchHit,
          askAi, runWorkflow,
          // presence + onboarding + members + versions + push
          presence, onboarding, dismissOnboarding,
          membersModal, openMembersModal, inviteMember, removeMember, setMemberRole, createUser,
          versionsModal, openVersionsModal, loadVersion, restoreVersion,
          notifyChannels, pushAiMessage,
        };
      },
    };

    createApp(App).mount('#app');
  </script>
</body>
</html>
